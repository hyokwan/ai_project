<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 이미지 분석기</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
    }

    .container {
      width: 100%;
      max-width: 720px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #a78bfa;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 28px;
    }

    /* ── 탭 ── */
    .tab-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      border-bottom: 1px solid #2d3148;
      padding-bottom: 0;
    }

    .tab-btn {
      padding: 10px 20px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #64748b;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      margin-bottom: -1px;
    }

    .tab-btn:hover { color: #a78bfa; }
    .tab-btn.active { color: #a78bfa; border-bottom-color: #a78bfa; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── 카드 공통 ── */
    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 14px;
    }

    /* ── 업로드 영역 ── */
    .upload-zone {
      border: 2px dashed #3b4263;
      border-radius: 10px;
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .upload-zone:hover { border-color: #a78bfa; background: #252840; }
    .upload-zone.dragover { border-color: #a78bfa; background: #252840; }
    .upload-zone input[type="file"] { display: none; }

    .upload-icon { font-size: 2.2rem; margin-bottom: 10px; }

    .upload-hint {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 6px;
    }

    .preview-wrap {
      display: none;
      margin-top: 16px;
      text-align: center;
    }

    .preview-wrap img {
      max-width: 100%;
      max-height: 320px;
      border-radius: 8px;
      border: 1px solid #2d3148;
      object-fit: contain;
    }

    .preview-name {
      font-size: 0.78rem;
      color: #64748b;
      margin-top: 8px;
    }

    /* ── 텍스트 입력 ── */
    textarea {
      width: 100%;
      background: #13151f;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.9rem;
      padding: 12px 14px;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #a78bfa; }
    textarea::placeholder { color: #3b4263; }

    /* ── 버튼 ── */
    .btn-action {
      width: 100%;
      padding: 14px;
      background: #7c3aed;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    .btn-action:hover:not(:disabled) { background: #6d28d9; }
    .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── 로딩 ── */
    .loading-box {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 16px;
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      color: #a78bfa;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #3b4263;
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 결과 ── */
    .result-card { display: none; }

    .result-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .badge {
      background: #252840;
      border: 1px solid #3b4263;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.73rem;
      color: #94a3b8;
    }

    .badge span { color: #a78bfa; font-weight: 600; }

    .result-label {
      font-size: 0.75rem;
      color: #64748b;
      margin-bottom: 6px;
      margin-top: 14px;
    }

    .result-box {
      background: #13151f;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 14px;
      font-size: 0.88rem;
      line-height: 1.7;
      color: #cbd5e1;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── 에러 ── */
    .error-box {
      display: none;
      background: #2a1a1a;
      border: 1px solid #7f1d1d;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 0.87rem;
      color: #fca5a5;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">

    <h1>AI 이미지 분석기</h1>
    <p class="subtitle">이미지를 업로드하고 원하는 기능을 선택하세요.</p>

    <!-- 탭 바 -->
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('analyze', this)">이미지 분석(Gemma2EB)</button>
      <button class="tab-btn"        onclick="switchTab('ocr', this)">OCR 텍스트 추출(Chandra)</button>
    </div>

    <!-- ════════════════════════════════════════════════════
         탭 1: 이미지 분석 (포트 8000)
    ════════════════════════════════════════════════════ -->
    <div class="tab-panel active" id="panel-analyze">

      <div class="card">
        <div class="card-title">이미지 선택</div>
        <div class="upload-zone" id="analyzeUploadZone">
          <div class="upload-icon">🖼️</div>
          <div>클릭하거나 이미지를 드래그하세요</div>
          <div class="upload-hint">JPG · PNG · WEBP · GIF &nbsp;|&nbsp; 최대 10MB</div>
          <input type="file" id="analyzeFileInput" accept="image/jpeg,image/png,image/webp,image/gif" />
        </div>
        <div class="preview-wrap" id="analyzePreviewWrap">
          <img id="analyzePreviewImg" alt="미리보기" />
          <div class="preview-name" id="analyzePreviewName"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">질문 입력</div>
        <textarea id="analyzeQuestion" placeholder="예: 이 이미지에서 텍스트를 추출해줘.">이 이미지에서 텍스트를 추출하고 내용을 설명해줘.</textarea>
      </div>

      <button class="btn-action" id="analyzeBtn" onclick="runAnalyze()">분석하기</button>

      <div class="error-box"  id="analyzeError"></div>
      <div class="loading-box" id="analyzeLoading">
        <div class="spinner"></div>AI가 분석 중입니다...
      </div>

      <div class="card result-card" id="analyzeResultCard">
        <div class="card-title">분석 결과</div>
        <div class="result-meta" id="analyzeResultMeta"></div>
        <div class="result-label">질문</div>
        <div class="result-box" id="analyzeResultQuestion"></div>
        <div class="result-label">AI 답변</div>
        <div class="result-box" id="analyzeResultAnswer"></div>
      </div>

    </div>

    <!-- ════════════════════════════════════════════════════
         탭 2: OCR (포트 8001)
    ════════════════════════════════════════════════════ -->
    <div class="tab-panel" id="panel-ocr">

      <div class="card">
        <div class="card-title">이미지 선택</div>
        <div class="upload-zone" id="ocrUploadZone">
          <div class="upload-icon">📄</div>
          <div>클릭하거나 이미지를 드래그하세요</div>
          <div class="upload-hint">JPG · PNG · WEBP · GIF &nbsp;|&nbsp; 최대 10MB</div>
          <input type="file" id="ocrFileInput" accept="image/jpeg,image/png,image/webp,image/gif" />
        </div>
        <div class="preview-wrap" id="ocrPreviewWrap">
          <img id="ocrPreviewImg" alt="미리보기" />
          <div class="preview-name" id="ocrPreviewName"></div>
        </div>
      </div>

      <button class="btn-action" id="ocrBtn" onclick="runOcr()">텍스트 추출</button>

      <div class="error-box"  id="ocrError"></div>
      <div class="loading-box" id="ocrLoading">
        <div class="spinner"></div>OCR 처리 중입니다... (시간이 걸릴 수 있습니다)
      </div>

      <div class="card result-card" id="ocrResultCard">
        <div class="card-title">추출 결과</div>
        <div class="result-meta" id="ocrResultMeta"></div>
        <div class="result-label">추출된 텍스트</div>
        <div class="result-box" id="ocrResultText"></div>
      </div>

    </div>

  </div>

  <script>
    // ── 탭 전환
    function switchTab(name, btn) {
      for (const el of document.querySelectorAll('.tab-panel')) el.classList.remove('active');
      for (const el of document.querySelectorAll('.tab-btn'))   el.classList.remove('active');
      document.getElementById('panel-' + name).classList.add('active');
      btn.classList.add('active');
    }

    // ── 업로드 영역 초기화 헬퍼
    function initUpload(zoneId, inputId, previewImgId, previewNameId, previewWrapId, onFile) {
      const zone  = document.getElementById(zoneId);
      const input = document.getElementById(inputId);

      zone.addEventListener('click', () => input.click());
      input.addEventListener('change', (e) => onFile(e.target.files[0]));

      zone.addEventListener('dragover',  (e) => { e.preventDefault(); zone.classList.add('dragover'); });
      zone.addEventListener('dragleave', ()  => zone.classList.remove('dragover'));
      zone.addEventListener('drop', (e) => {
        e.preventDefault();
        zone.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) onFile(e.dataTransfer.files[0]);
      });

      return function handleFile(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          document.getElementById(previewImgId).src   = e.target.result;
          document.getElementById(previewNameId).textContent = file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)';
          document.getElementById(previewWrapId).style.display = 'block';
        };
        reader.readAsDataURL(file);
      };
    }

    // ── 이미지 분석 탭
    let analyzeFile = null;
    const handleAnalyzeFile = initUpload(
      'analyzeUploadZone', 'analyzeFileInput',
      'analyzePreviewImg', 'analyzePreviewName', 'analyzePreviewWrap',
      (f) => { analyzeFile = f; handleAnalyzeFile(f); }
    );

    async function runAnalyze() {
      if (!analyzeFile) { showError('analyzeError', '이미지를 먼저 선택해주세요.'); return; }
      const question = document.getElementById('analyzeQuestion').value.trim();
      if (!question)  { showError('analyzeError', '질문을 입력해주세요.'); return; }

      setLoading('analyzeLoading', 'analyzeBtn', true, '분석 중...');
      hideError('analyzeError');
      document.getElementById('analyzeResultCard').style.display = 'none';

      const formData = new FormData();
      formData.append('image', analyzeFile);
      formData.append('question', question);

      try {
        const res  = await fetch('/analyze', { method: 'POST', body: formData });
        const data = await res.json();

        if (!res.ok || !data.success) { showError('analyzeError', data.message || '오류 발생'); return; }

        document.getElementById('analyzeResultMeta').innerHTML     = '<div class="badge">모델 <span>' + data.model + '</span></div>';
        document.getElementById('analyzeResultQuestion').textContent = data.question;
        document.getElementById('analyzeResultAnswer').textContent   = data.answer;
        document.getElementById('analyzeResultCard').style.display   = 'block';
        document.getElementById('analyzeResultCard').scrollIntoView({ behavior: 'smooth', block: 'start' });

      } catch (err) {
        showError('analyzeError', '서버 연결 실패: ' + err.message);
      } finally {
        setLoading('analyzeLoading', 'analyzeBtn', false, '분석하기');
      }
    }

    // ── OCR 탭
    let ocrFile = null;
    const handleOcrFile = initUpload(
      'ocrUploadZone', 'ocrFileInput',
      'ocrPreviewImg', 'ocrPreviewName', 'ocrPreviewWrap',
      (f) => { ocrFile = f; handleOcrFile(f); }
    );

    async function runOcr() {
      if (!ocrFile) { showError('ocrError', '이미지를 먼저 선택해주세요.'); return; }

      setLoading('ocrLoading', 'ocrBtn', true, '추출 중...');
      hideError('ocrError');
      document.getElementById('ocrResultCard').style.display = 'none';

      const formData = new FormData();
      formData.append('image', ocrFile);

      try {
        const res  = await fetch('/ocr', { method: 'POST', body: formData });
        const data = await res.json();

        if (!res.ok || !data.success) { showError('ocrError', data.message || '오류 발생'); return; }

        document.getElementById('ocrResultMeta').innerHTML    = '<div class="badge">모델 <span>' + data.model + '</span></div>';
        document.getElementById('ocrResultText').textContent  = data.extracted_text;
        document.getElementById('ocrResultCard').style.display = 'block';
        document.getElementById('ocrResultCard').scrollIntoView({ behavior: 'smooth', block: 'start' });

      } catch (err) {
        showError('ocrError', '서버 연결 실패: ' + err.message);
      } finally {
        setLoading('ocrLoading', 'ocrBtn', false, '텍스트 추출');
      }
    }

    // ── 공통 헬퍼
    function setLoading(loadingId, btnId, on, label) {
      document.getElementById(loadingId).style.display = on ? 'flex' : 'none';
      document.getElementById(btnId).disabled          = on;
      document.getElementById(btnId).textContent       = on ? label : document.getElementById(btnId).dataset.label || label;
    }

    function showError(id, msg) {
      const box = document.getElementById(id);
      box.textContent   = '⚠️ ' + msg;
      box.style.display = 'block';
    }

    function hideError(id) {
      document.getElementById(id).style.display = 'none';
    }
  </script>
</body>
</html>
